<!-- ВСТАВЬ ВНУТРЬ <body> ПОСЛЕ ЗАГОЛОВКА -->

<div style="text-align:center;margin:15px;">
<button onclick="toggleTheme()">🌙 Тема</button>
<button onclick="clearChat()">🗑 Очистить чат</button>
<button onclick="quickMath()">➕ Математика</button>
<button onclick="showContacts()">📞 Контакты</button>
<button onclick="showHelp()">❓ Помощь</button>
</div>

<div id="clock" style="text-align:center;color:gold;"></div>

<style>

.logo{
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px gold;
}
to{
text-shadow:0 0 30px gold;
}
}

.light{
background:white !important;
color:black !important;
}

.glow-btn{
box-shadow:0 0 15px gold;
}

.message{
margin:10px 0;
padding:8px;
border-radius:10px;
background:#222;
}

.time{
font-size:11px;
color:#999;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}
</style>

<canvas id="particles"></canvas>

<div class="card">
<h2>📚 Таблица умножения</h2>
<p>
2×2=4<br>
3×3=9<br>
4×4=16<br>
5×5=25<br>
6×6=36<br>
7×7=49<br>
8×8=64<br>
9×9=81<br>
10×10=100
</p>
</div>

<div class="card">
<h2>🧮 Калькулятор</h2>
<input id="calcInput" placeholder="Например: 5+5">
<button onclick="calculate()">Решить</button>
<div id="calcResult"></div>
</div>

<div class="card">
<h2>🇬🇧 Английские слова</h2>
<p>Hello — Привет</p>
<p>Good — Хорошо</p>
<p>Book — Книга</p>
<p>House — Дом</p>
<p>Money — Деньги</p>
</div>

<div class="card">
<h2>🏆 Викторина</h2>
<p>Сколько будет 2+2?</p>
<button onclick="alert('Правильно!')">4</button>
<button onclick="alert('Неверно')">5</button>
</div>

<script>

function toggleTheme(){
document.body.classList.toggle('light');
}

function clearChat(){
document.getElementById('messages').innerHTML='';
}

function quickMath(){
document.getElementById('userInput').value='математика';
}

function updateClock(){
let now=new Date();
document.getElementById('clock').innerHTML=
now.toLocaleTimeString();
}
setInterval(updateClock,1000);

function calculate(){
try{
let result=eval(
document.getElementById('calcInput').value
);
document.getElementById('calcResult').innerHTML=
'Ответ: '+result;
}catch{
document.getElementById('calcResult').innerHTML=
'Ошибка';
}
}

const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){

ctx.clearRect(0,0,
canvas.width,
canvas.height);

ctx.fillStyle='gold';

particles.forEach(p=>{

ctx.beginPath();

ctx.arc(
p.x,
p.y,
p.r,
0,
Math.PI*2
);

ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0)p.x=canvas.width;
if(p.x>canvas.width)p.x=0;
if(p.y<0)p.y=canvas.height;
if(p.y>canvas.height)p.y=0;

});

requestAnimationFrame(
animate
);

}

animate();

</script>
