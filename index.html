<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЧАТ-БОТ</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
text-align:center;
}

header{
padding:50px 20px;
background:linear-gradient(135deg,#000,#222);
}

h1{
font-size:48px;
color:gold;
}

p{
font-size:18px;
}

.box{
max-width:700px;
margin:30px auto;
padding:20px;
}

input{
width:80%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:gold;
color:black;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

#answer{
margin-top:20px;
padding:15px;
background:#222;
border-radius:10px;
}

.footer{
margin-top:50px;
padding:20px;
background:#000;
color:gold;
}
</style></head><body><header>
<h1>ЧАТ-БОТ</h1>
<p>Это мой собственный первый чат-бот, который я создал.</p>
<p>Наш босс — Мубориз</p>
</header><div class="box"><h2>Задайте вопрос</h2><input id="question" placeholder="Напишите вопрос..."><br><button onclick="reply()">Спросить</button>

<div id="answer">
Ответ появится здесь.
</div></div><div class="footer">
Связь с Муборизом: 992 011 900 303
</div><script>
function reply(){

let q=document.getElementById("question").value.toLowerCase();
let a="Я пока молодой чат-бот. Попробуйте другой вопрос.";

if(q.includes("2+2")){
a="Ответ: 4";
}
else if(q.includes("5+5")){
a="Ответ: 10";
}
else if(q.includes("привет")){
a="Привет! Рад вас видеть.";
}
else if(q.includes("кто твой босс")){
a="Мой босс — Мубориз.";
}
else if(q.includes("номер")){
a="Номер Мубориза: 992 011 900 303";
}
else if(q.includes("матем")){
a="Я могу помочь с простыми математическими вопросами.";
}

document.getElementById("answer").innerHTML=a;
}
</script></body>
</html>
